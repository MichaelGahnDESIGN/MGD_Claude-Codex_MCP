name: Quality Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-check:
    name: Vorlage prüfen
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sichtbare Root-Dateien prüfen
        run: |
          set -euo pipefail
          unerwartete_dateien="$(find . -maxdepth 1 -type f \
            ! -name 'README.md' \
            ! -name 'LICENSE' \
            ! -name 'CHANGELOG.md' \
            ! -name 'VERSION' \
            ! -name 'SECURITY.md' \
            ! -name 'index.md' \
            ! -name 'claude.md' \
            ! -name 'CLAUDE.md' \
            ! -name 'AGENTS.md' \
            ! -name '.*' \
            -print)"
          if [ -n "$unerwartete_dateien" ]; then
            echo "$unerwartete_dateien"
            exit 1
          fi

      - name: Lokale Artefakte und Secrets prüfen
        run: |
          set -euo pipefail
          lokale_artefakte="$(find . -path './.git' -prune -o \( \
            -type d \( -name 'node_modules' -o -name '__pycache__' \) -o \
            -type f \( -name '.env' -o -name '*.log' -o -name '.DS_Store' \) \
            \) -print)"
          if [ -n "$lokale_artefakte" ]; then
            echo "$lokale_artefakte"
            exit 1
          fi
          python3 - <<'PY'
          from pathlib import Path

          suchbegriffe = [
              "/" + "Volumes/",
              "/" + "Users/",
              "smb:" + "//",
              "quick" + "connect",
              "Syno" + "Token",
              "192" + "-168",
          ]
          ausnahmen = {Path("DEMOS/OPENROUTER/package-lock.json")}
          treffer = []

          for pfad in Path(".").rglob("*"):
              if ".git" in pfad.parts or pfad in ausnahmen or not pfad.is_file():
                  continue
              try:
                  inhalt = pfad.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for suchbegriff in suchbegriffe:
                  if suchbegriff in inhalt:
                      treffer.append(f"{pfad}: enthält privaten oder lokalen Hinweis")
                      break

          if treffer:
              print("\n".join(treffer))
              raise SystemExit(1)
          PY

      - name: Dokumentationsdaten aktualisieren
        run: python3 DOKUMENTATION/Dokumentation-Skills/generate_dokumentationsdaten.py

      - name: Dokumentationsdaten müssen reproduzierbar sein
        run: git diff --exit-code -- DOKUMENTATION/Dokumentation-Skills/generated

      - name: OpenRouter-Demo syntaktisch prüfen
        run: npm --prefix DEMOS/OPENROUTER run check
